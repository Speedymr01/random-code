<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL DEFENSE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0c0c0c; overflow: hidden; font-family: monospace; }
        #gameCanvas { display: block; }
        #ui { position: fixed; top: 20px; left: 20px; color: #666; font-size: 18px; z-index: 10; pointer-events: none; }
        #score { font-size: 24px; font-weight: bold; }
        #lives { margin-top: 10px; font-size: 16px; color: #555; }
        #startScreen, #gameOverScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0c0c0c; z-index: 100; }
        #gameOverScreen { display: none; }
        h1 { font-size: 48px; font-weight: bold; color: #444; }
        .subtitle { color: #333; font-size: 14px; margin-top: 10px; }
        button { margin-top: 30px; padding: 12px 40px; font-family: monospace; font-size: 16px; color: #555; background: transparent; border: 1px solid #333; cursor: pointer; }
        button:hover { background: #1a1a1a; color: #777; }
        .instructions { margin-top: 20px; color: #333; font-size: 12px; text-align: center; }
        .final-score { font-size: 24px; color: #444; margin-top: 15px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">LIVES: 3</div>
    </div>
    <div id="startScreen">
        <h1>TERMINAL DEFENSE</h1>
        <div class="subtitle">PROTECT THE CORE</div>
        <button id="startBtn">START GAME</button>
        <div class="instructions">MOUSE to aim - CLICK to shoot</div>
    </div>
    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <div class="final-score" id="finalScore">SCORE: 0</div>
        <button id="restartBtn">PLAY AGAIN</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const C = { p: '#555', b: '#666', t: 'rgba(80,80,80,0.2)', e: '#444', core: '#333', cg: 'rgba(50,50,50,0.3)' };

        const ui = { score: document.getElementById('score'), lives: document.getElementById('lives'), startScreen: document.getElementById('startScreen'), gameOverScreen: document.getElementById('gameOverScreen'), finalScore: document.getElementById('finalScore'), startBtn: document.getElementById('startBtn'), restartBtn: document.getElementById('restartBtn') };

        let game = { running: false, score: 0, lives: 3, player: null, bullets: [], enemies: [], particles: [], enemySpawnRate: 1500, lastSpawn: 0, mouseX: canvas.width/2, mouseY: canvas.height/2 };

        class Player {
            constructor() { this.x = canvas.width/2; this.y = canvas.height - 80; this.size = 25; this.angle = -Math.PI/2; }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.beginPath(); ctx.moveTo(0, -this.size); ctx.lineTo(-this.size*0.6, this.size*0.7); ctx.lineTo(this.size*0.6, this.size*0.7); ctx.closePath();
                ctx.fillStyle = C.p; ctx.fill(); ctx.restore();
            }
            update() { this.angle = Math.atan2(game.mouseY - this.y, game.mouseX - this.x); }
        }

        class Bullet {
            constructor(x, y, angle) { this.x = x; this.y = y; this.angle = angle; this.speed = 10; this.size = 3; this.trail = []; }
            update() {
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 5) this.trail.shift();
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }
            draw() {
                this.trail.forEach((t, i) => { ctx.beginPath(); ctx.arc(t.x, t.y, this.size * (i/5), 0, Math.PI*2); ctx.fillStyle = C.t; ctx.fill(); });
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fillStyle = C.b; ctx.fill();
            }
            isOffScreen() { return this.x < -30 || this.x > canvas.width+30 || this.y < -30 || this.y > canvas.height+30; }
        }

        class Enemy {
            constructor() {
                this.size = 15 + Math.random()*10;
                const side = Math.floor(Math.random()*4);
                if (side === 0) { this.x = Math.random()*canvas.width; this.y = -this.size; }
                else if (side === 1) { this.x = canvas.width+this.size; this.y = Math.random()*canvas.height; }
                else if (side === 2) { this.x = Math.random()*canvas.width; this.y = canvas.height+this.size; }
                else { this.x = -this.size; this.y = Math.random()*canvas.height; }
                this.speed = 1 + Math.random() + game.score/5000;
                this.hp = 1; this.angle = 0; this.spinSpeed = (Math.random()-0.5)*0.05;
                this.gray = 40 + Math.floor(Math.random()*30);
            }
            update(tx, ty) { const a = Math.atan2(ty-this.y, tx-this.x); this.x += Math.cos(a)*this.speed; this.y += Math.sin(a)*this.speed; this.angle += this.spinSpeed; }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.beginPath();
                for (let i = 0; i < 5; i++) { const ang = (Math.PI*2/5)*i; const r = i%2===0 ? this.size : this.size*0.5; if (i===0) ctx.moveTo(Math.cos(ang)*r, Math.sin(ang)*r); else ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r); }
                ctx.closePath(); ctx.strokeStyle = `rgb(${this.gray},${this.gray},${this.gray})`; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
            }
            hits(px, py, s) { return Math.hypot(this.x-px, this.y-py) < this.size + s; }
        }

        class Particle {
            constructor(x, y, gray) { this.x = x; this.y = y; this.gray = gray; this.angle = Math.random()*Math.PI*2; this.speed = Math.random()*2; this.size = Math.random()*2+1; this.alpha = 1; this.decay = 0.03; }
            update() { this.x += Math.cos(this.angle)*this.speed; this.y += Math.sin(this.angle)*this.speed; this.alpha -= this.decay; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fillStyle = `rgba(${this.gray},${this.gray},${this.gray},${this.alpha})`; ctx.fill(); }
            isDead() { return this.alpha <= 0; }
        }

        function spawnP(x, y, gray, n) { for (let i=0; i<n; i++) game.particles.push(new Particle(x, y, gray)); }

        function checkCollisions() {
            for (let i = game.bullets.length-1; i>=0; i--) {
                for (let j = game.enemies.length-1; j>=0; j--) {
                    if (Math.hypot(game.bullets[i].x-game.enemies[j].x, game.bullets[i].y-game.enemies[j].y) < game.enemies[j].size+game.bullets[i].size) {
                        game.bullets.splice(i, 1); spawnP(game.enemies[j].x, game.enemies[j].y, game.enemies[j].gray, 5);
                        game.enemies.splice(j, 1); game.score += 50; ui.score.textContent = 'SCORE: '+game.score; break;
                    }
                }
            }
            for (let i = game.enemies.length-1; i>=0; i--) {
                if (game.enemies[i].hits(game.player.x, game.player.y, game.player.size) || Math.hypot(game.enemies[i].x-canvas.width/2, game.enemies[i].y-canvas.height/2) < 35) {
                    spawnP(game.player.x, game.player.y, 80, 10); game.enemies.splice(i, 1); game.lives--; ui.lives.textContent = 'LIVES: '+game.lives;
                    if (game.lives <= 0) { game.running = false; ui.finalScore.textContent = 'SCORE: '+game.score; ui.gameOverScreen.style.display = 'flex'; }
                }
            }
        }

        function drawBG() {
            ctx.fillStyle = '#0c0c0c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 25, 0, Math.PI*2); ctx.strokeStyle = C.core; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 32, 0, Math.PI*2); ctx.strokeStyle = C.cg; ctx.lineWidth = 1; ctx.stroke();
        }

        function loop(ts) {
            if (!game.running) return;
            drawBG();
            if (ts - game.lastSpawn > game.enemySpawnRate) { game.enemies.push(new Enemy()); game.lastSpawn = ts; game.enemySpawnRate = Math.max(500, 1500 - game.score/10); }
            game.player.update(); game.player.draw();
            game.bullets.forEach((b, i) => { b.update(); b.draw(); if (b.isOffScreen()) game.bullets.splice(i, 1); });
            game.enemies.forEach(e => { e.update(game.player.x, game.player.y); e.draw(); });
            game.particles.forEach((p, i) => { p.update(); p.draw(); if (p.isDead()) game.particles.splice(i, 1); });
            checkCollisions();
            requestAnimationFrame(loop);
        }

        function start() {
            game = { running: true, score: 0, lives: 3, player: new Player(), bullets: [], enemies: [], particles: [], enemySpawnRate: 1500, lastSpawn: 0, mouseX: canvas.width/2, mouseY: canvas.height/2 };
            ui.score.textContent = 'SCORE: 0'; ui.lives.textContent = 'LIVES: 3'; ui.startScreen.style.display = 'none'; ui.gameOverScreen.style.display = 'none';
            requestAnimationFrame(loop);
        }

        canvas.onmousemove = e => { game.mouseX = e.clientX; game.mouseY = e.clientY; };
        canvas.onclick = () => { if (game.running) game.bullets.push(new Bullet(game.player.x+Math.cos(game.player.angle)*20, game.player.y+Math.sin(game.player.angle)*20, game.player.angle)); };
        ui.startBtn.onclick = start; ui.restartBtn.onclick = start;
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        drawBG();
    </script>
</body>
</html>
