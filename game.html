<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PULSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0c0c;
            overflow: hidden;
            font-family: 'Orbitron', monospace;
        }

        #gameCanvas {
            display: block;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ccc;
            font-size: 18px;
            z-index: 10;
            pointer-events: none;
        }

        #score {
            font-size: 24px;
            font-weight: 700;
        }

        #lives {
            margin-top: 10px;
            font-size: 16px;
            color: #888;
        }

        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(12, 12, 12, 0.98);
            z-index: 100;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            color: #4a4a4a;
            text-shadow: 0 0 2px #4a4a4a;
        }

        .subtitle {
            color: #333;
            font-size: 14px;
            margin-top: 10px;
            letter-spacing: 4px;
        }

        button {
            margin-top: 40px;
            padding: 15px 50px;
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            color: #666;
            background: transparent;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: #1a1a1a;
            color: #888;
            border-color: #555;
        }

        .instructions {
            margin-top: 30px;
            color: #333;
            font-size: 12px;
            text-align: center;
            line-height: 2;
        }

        .final-score {
            font-size: 36px;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">LIVES: 3</div>
    </div>

    <div id="startScreen">
        <h1>TERMINAL DEFENSE</h1>
        <div class="subtitle">PROTECT THE CORE</div>
        <button id="startBtn">START GAME</button>
        <div class="instructions">
            MOUSE to aim • CLICK to shoot<br>
            Destroy enemies before they reach the core
        </div>
    </div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <div class="final-score" id="finalScore">SCORE: 0</div>
        <button id="restartBtn">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const COLORS = {
            player: '#666',
            bullet: '#888',
            bulletTrail: 'rgba(100, 100, 100, 0.3)',
            enemy: '#555',
            enemyFill: '#333',
            particle: 'rgba(80, 80, 80, 1)',
            core: '#444',
            coreGlow: 'rgba(60, 60, 60, 0.3)'
        };

        const ui = {
            score: document.getElementById('score'),
            lives: document.getElementById('lives'),
            startScreen: document.getElementById('startScreen'),
            gameOverScreen: document.getElementById('gameOverScreen'),
            finalScore: document.getElementById('finalScore'),
            startBtn: document.getElementById('startBtn'),
            restartBtn: document.getElementById('restartBtn')
        };

        let game = {
            running: false,
            score: 0,
            lives: 3,
            player: null,
            bullets: [],
            enemies: [],
            particles: [],
            enemySpawnRate: 1500,
            lastSpawn: 0,
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2
        };

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 80;
                this.size = 30;
                this.angle = -Math.PI / 2;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(-this.size * 0.7, this.size * 0.8);
                ctx.lineTo(this.size * 0.7, this.size * 0.8);
                ctx.closePath();
                
                ctx.fillStyle = COLORS.player;
                ctx.fill();
                
                ctx.restore();
            }

            update() {
                const targetAngle = Math.atan2(game.mouseY - this.y, game.mouseX - this.x);
                this.angle = targetAngle;
            }
        }

        class Bullet {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.speed = 12;
                this.size = 4;
                this.trail = [];
            }

            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 8) this.trail.shift();
                this.trail.forEach(t => t.alpha -= 0.12);

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }

            draw() {
                this.trail.forEach(t => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * t.alpha * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = COLORS.bulletTrail;
                    ctx.fill();
                });

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.bullet;
                ctx.fill();
            }

            isOffScreen() {
                return this.x < -50 || this.x > canvas.width + 50 || 
                       this.y < -50 || this.y > canvas.height + 50;
            }
        }

        class Enemy {
            constructor() {
                this.size = 20 + Math.random() * 15;
                const side = Math.floor(Math.random() * 4);
                
                switch(side) {
                    case 0: this.x = Math.random() * canvas.width; this.y = -this.size; break;
                    case 1: this.x = canvas.width + this.size; this.y = Math.random() * canvas.height; break;
                    case 2: this.x = Math.random() * canvas.width; this.y = canvas.height + this.size; break;
                    case 3: this.x = -this.size; this.y = Math.random() * canvas.height; break;
                }

                this.speed = 1.5 + Math.random() * 1.5 + game.score / 5000;
                this.hp = Math.floor(this.size / 15);
                this.angle = 0;
                this.spinSpeed = (Math.random() - 0.5) * 0.08;
                this.gray = Math.floor(40 + Math.random() * 40);
                this.color = `rgb(${this.gray}, ${this.gray}, ${this.gray})`;
            }

            update(targetX, targetY) {
                const angle = Math.atan2(targetY - this.y, targetX - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
                this.angle += this.spinSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const a = (Math.PI * 2 / 6) * i;
                    const r = i % 2 === 0 ? this.size : this.size * 0.5;
                    const x = Math.cos(a) * r;
                    const y = Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();

                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                if (this.hp > 1) {
                    ctx.fillStyle = this.color;
                    ctx.font = '12px Orbitron';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.hp, 0, 0);
                }

                ctx.restore();
            }

            hitsPlayer(px, py, size) {
                const dist = Math.hypot(this.x - px, this.y - py);
                return dist < this.size + size;
            }
        }

        class Particle {
            constructor(x, y, gray, speed = 2) {
                this.x = x;
                this.y = y;
                this.gray = gray;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * speed;
                this.size = Math.random() * 3 + 1;
                this.alpha = 1;
                this.decay = 0.015 + Math.random() * 0.015;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.alpha -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.gray}, ${this.gray}, ${this.gray}, ${this.alpha})`;
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        function spawnParticles(x, y, gray, count = 10) {
            for (let i = 0; i < count; i++) {
                game.particles.push(new Particle(x, y, gray));
            }
        }

        function spawnRing(x, y) {
            for (let i = 0; i < 20; i++) {
                const p = new Particle(x, y, 80, 3);
                p.angle = (Math.PI * 2 / 20) * i;
                p.speed = 3;
                p.size = 2;
                game.particles.push(p);
            }
        }

        function checkCollisions() {
            for (let i = game.bullets.length - 1; i >= 0; i--) {
                const bullet = game.bullets[i];
                
                for (let j = game.enemies.length - 1; j >= 0; j--) {
                    const enemy = game.enemies[j];
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    
                    if (dist < enemy.size + bullet.size) {
                        game.bullets.splice(i, 1);
                        enemy.hp--;
                        
                        spawnParticles(enemy.x, enemy.y, enemy.gray, 3);
                        
                        if (enemy.hp <= 0) {
                            spawnParticles(enemy.x, enemy.y, enemy.gray, 10);
                            game.enemies.splice(j, 1);
                            game.score += 100;
                            ui.score.textContent = `SCORE: ${game.score}`;
                        }
                        break;
                    }
                }
            }

            for (let i = game.enemies.length - 1; i >= 0; i--) {
                const enemy = game.enemies[i];
                
                if (enemy.hitsPlayer(game.player.x, game.player.y, game.player.size)) {
                    spawnRing(game.player.x, game.player.y);
                    game.enemies.splice(i, 1);
                    game.lives--;
                    updateLives();
                    
                    if (game.lives <= 0) {
                        endGame();
                        return;
                    }
                }

                const distToCenter = Math.hypot(enemy.x - canvas.width/2, enemy.y - canvas.height/2);
                if (distToCenter < 40) {
                    spawnRing(canvas.width/2, canvas.height/2);
                    game.enemies.splice(i, 1);
                    game.lives--;
                    updateLives();
                    
                    if (game.lives <= 0) {
                        endGame();
                        return;
                    }
                }
            }
        }

        function updateLives() {
            ui.lives.textContent = `LIVES: ${game.lives}`;
        }

        function drawBackground() {
            ctx.fillStyle = '#0c0c0c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const time = Date.now() * 0.001;

            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.strokeStyle = COLORS.core;
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY, 38 + Math.sin(time * 2) * 3, 0, Math.PI * 2);
            ctx.strokeStyle = COLORS.coreGlow;
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function gameLoop(timestamp) {
            if (!game.running) return;

            drawBackground();

            if (timestamp - game.lastSpawn > game.enemySpawnRate) {
                game.enemies.push(new Enemy());
                game.lastSpawn = timestamp;
                game.enemySpawnRate = Math.max(600, 1500 - game.score / 10);
            }

            game.player.update();
            game.player.draw();

            game.bullets.forEach((bullet, i) => {
                bullet.update();
                bullet.draw();
                if (bullet.isOffScreen()) {
                    game.bullets.splice(i, 1);
                }
            });

            game.enemies.forEach(enemy => {
                enemy.update(game.player.x, game.player.y);
                enemy.draw();
            });

            game.particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.isDead()) {
                    game.particles.splice(i, 1);
                }
            });

            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            game = {
                running: true,
                score: 0,
                lives: 3,
                player: new Player(),
                bullets: [],
                enemies: [],
                particles: [],
                enemySpawnRate: 1500,
                lastSpawn: 0,
                mouseX: canvas.width / 2,
                mouseY: canvas.height / 2
            };

            ui.score.textContent = 'SCORE: 0';
            updateLives();
            ui.startScreen.style.display = 'none';
            ui.gameOverScreen.style.display = 'none';
            
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            game.running = false;
            ui.finalScore.textContent = `SCORE: ${game.score}`;
            ui.gameOverScreen.style.display = 'flex';
        }

        canvas.addEventListener('mousemove', (e) => {
            game.mouseX = e.clientX;
            game.mouseY = e.clientY;
        });

        canvas.addEventListener('click', () => {
            if (game.running) {
                const bullet = new Bullet(
                    game.player.x + Math.cos(game.player.angle) * 30,
                    game.player.y + Math.sin(game.player.angle) * 30,
                    game.player.angle
                );
                game.bullets.push(bullet);
            }
        });

        ui.startBtn.addEventListener('click', startGame);
        ui.restartBtn.addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        drawBackground();
    </script>
</body>
</html>
